---
# SSH hardening role for Ubuntu 24.04 LTS

- name: Ensure OpenSSH server is installed
  ansible.builtin.apt:
    name: openssh-server
    state: present
  become: true

- name: Deploy hardened sshd_config
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    backup: true
    validate: "sshd -t -f %s"
  become: true
  notify: Restart sshd

- name: Deploy SSH banner
  ansible.builtin.template:
    src: banner.j2
    dest: "{{ ssh_banner_path }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when: ssh_banner_enabled

- name: Remove small Diffie-Hellman moduli
  ansible.builtin.shell:
    cmd: |
      awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.safe
      mv /etc/ssh/moduli.safe /etc/ssh/moduli
  changed_when: false
  become: true

- name: Ensure sshd is enabled and running
  ansible.builtin.systemd:
    name: ssh
    state: started
    enabled: true
  become: true
