---
# SSH hardening role defaults

# SSH port
ssh_port: 22

# Authentication
ssh_permit_root_login: "prohibit-password"
ssh_password_authentication: false
ssh_pubkey_authentication: true
ssh_permit_empty_passwords: false
ssh_challenge_response_authentication: false

# Security settings
ssh_max_auth_tries: 3
ssh_max_sessions: 5
ssh_login_grace_time: 30
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# Protocol and ciphers (modern secure defaults)
ssh_kex_algorithms:
  - curve25519-sha256
  - curve25519-sha256@libssh.org
  - diffie-hellman-group16-sha512
  - diffie-hellman-group18-sha512

ssh_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
  - aes256-ctr
  - aes192-ctr
  - aes128-ctr

ssh_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
  - hmac-sha2-512
  - hmac-sha2-256

ssh_host_key_algorithms:
  - ssh-ed25519
  - rsa-sha2-512
  - rsa-sha2-256

# Forwarding
ssh_x11_forwarding: false
ssh_allow_tcp_forwarding: false
ssh_allow_agent_forwarding: false

# Banner
ssh_banner_enabled: true
ssh_banner_path: "/etc/ssh/banner"

# Allowed users/groups (empty = no restriction)
ssh_allowed_users: []
ssh_allowed_groups: []
