---
# UFW firewall role defaults
#
# Compliance references:
#   - NIS2 Art 21.2(e) — network and information systems security
#   - GDPR Art 32 — security of processing
#   - POL-01 — access control policy (default deny)
#   - CRA Annex I Part I — protection of attack surface; secure interfaces
#   - ISO 27001:2022 A.8.20 — network security
#   - ISO 27001:2022 A.8.21 — security of network services

# Default policies — POL-01: default deny
ufw_default_incoming: "deny"
ufw_default_outgoing: "allow"
ufw_default_forward: "deny"

# Enable logging (NIS2 Art 21.2(a) — security event logging)
ufw_logging: "on"

# Enable IPv6 support
ufw_ipv6: true

# Rules to allow
# Each item should have: rule, port, proto, and optionally src, comment
ufw_rules:
  - rule: allow
    port: "22"
    proto: tcp
    comment: "SSH"

# Raw rules for more complex scenarios (applied as-is)
# Example: "allow from 10.0.0.0/8 to any port 5432 proto tcp"
ufw_raw_rules: []

# Rate limiting for SSH (limits connection attempts)
ufw_rate_limit_ssh: true

# Enable UFW after configuration
ufw_enabled: true

# Reset UFW before applying rules (use with caution)
ufw_reset: false
