---
# UFW firewall role for Ubuntu 24.04 LTS

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Configure UFW IPv6 support
  ansible.builtin.lineinfile:
    path: /etc/default/ufw
    regexp: "^IPV6="
    line: "IPV6={{ ufw_ipv6 | ternary('yes', 'no') }}"
  become: true

- name: Reset UFW to defaults
  community.general.ufw:
    state: reset
  become: true
  when: ufw_reset

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: "{{ ufw_default_incoming }}"
  become: true

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: "{{ ufw_default_outgoing }}"
  become: true

- name: Set default forward policy
  community.general.ufw:
    direction: routed
    policy: "{{ ufw_default_forward }}"
  become: true

- name: Apply rate limiting on SSH
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp
    comment: "SSH rate limit"
  become: true
  when: ufw_rate_limit_ssh

- name: Apply UFW rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
    src: "{{ item.src | default(omit) }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ ufw_rules }}"
  loop_control:
    label: "{{ item.comment | default(item.rule ~ ' ' ~ item.port) }}"
  become: true

- name: Apply raw UFW rules
  ansible.builtin.command:
    cmd: "ufw {{ item }}"
  loop: "{{ ufw_raw_rules }}"
  register: ufw_raw_result
  changed_when: "'Skipping adding existing rule' not in ufw_raw_result.stdout
    and 'Skipping inserting existing rule' not in ufw_raw_result.stdout"
  become: true
  when: ufw_raw_rules | length > 0

- name: Configure UFW logging
  community.general.ufw:
    logging: "{{ ufw_logging }}"
  become: true

- name: Enable UFW
  community.general.ufw:
    state: enabled
  become: true
  when: ufw_enabled
