---
# Log forwarding role defaults
#
# Compliance references:
#   - NIS2 Art 21.2(a) — information system security (centralised logging)
#   - NIS2 Art 21.2(b) — incident handling (forensic correlation)
#   - GDPR Art 5(2) — accountability (centralised audit evidence)
#   - GDPR Art 32 — security of processing
#   - CTL-0002 — immutable evidence store with retention controls
#   - CTL-0003 — logging legality, minimisation, and forensic correlation
#   - POL-02 — incident response (Wazuh/Falco/Alertmanager integration)
#   - POL-03 — cryptography policy (TLS for data in transit)
#   - ISO 27001:2022 A.8.15 — logging
#   - ISO 27001:2022 A.8.16 — monitoring activities

# Enable log forwarding
log_forwarding_enabled: true

# Forwarding protocol: tcp, udp, or relp (reliable)
log_forwarding_protocol: "tcp"

# Remote syslog server (SIEM/log aggregator endpoint)
# Set this to your centralised log server (e.g., Wazuh, Loki, OpenSearch)
log_forwarding_server: ""
log_forwarding_port: 514

# TLS for log forwarding — POL-03 cryptography policy: data in transit encrypted
log_forwarding_tls_enabled: false
log_forwarding_tls_ca_cert: ""
log_forwarding_tls_cert: ""
log_forwarding_tls_key: ""

# Forward audit logs specifically (auditd → remote)
log_forwarding_audit: true

# Log queue settings for reliability (prevent loss during outages)
log_forwarding_queue_size: 10000
log_forwarding_queue_type: "LinkedList"

# Rate limiting — GDPR Art 5(1)(c) data minimisation
log_forwarding_rate_limit_interval: 5
log_forwarding_rate_limit_burst: 200
