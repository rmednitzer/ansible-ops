---
# NTP role defaults (chrony)
#
# Compliance references:
#   - NIS2 Art 21.2(a) — information system security (time integrity)
#   - GDPR Art 5(2) — accountability (timestamp integrity for evidence)
#   - POL-04 — incident response (all actions timestamped)
#   - CTL-0006 — logging legality: forensic correlation requires synced time
#   - ISO 27001:2022 A.8.17 — clock synchronisation

# NTP servers — Austrian/European pools for regulatory jurisdiction alignment
# Using European servers ensures time source is within EU jurisdiction
ntp_servers:
  - "0.at.pool.ntp.org iburst"
  - "1.at.pool.ntp.org iburst"
  - "2.at.pool.ntp.org iburst"
  - "0.europe.pool.ntp.org iburst"

# NTP pools (alternative to individual servers)
ntp_pools: []

# Allow NTP clients from these networks (empty = no clients served)
ntp_allow_networks: []

# Chrony drift file location
ntp_driftfile: "/var/lib/chrony/chrony.drift"

# Log directory
ntp_logdir: "/var/log/chrony"

# Enable RTC sync
ntp_rtcsync: true

# Step the clock if offset is larger than this (seconds) on first 3 updates
ntp_makestep_threshold: 1.0
ntp_makestep_limit: 3

# NTS (Network Time Security) — authenticated time per POL-06 cryptography policy
# Enable when NTS-capable servers are available
ntp_nts_enabled: false
ntp_nts_servers: []
#  - "time.cloudflare.com nts iburst"
#  - "nts.netnod.se nts iburst"
