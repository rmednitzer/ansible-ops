---
# Filesystem hardening tasks

- name: Harden /tmp mount with noexec,nosuid,nodev
  ansible.posix.mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,noexec,nosuid,nodev,size={{ common_tmp_size }}"
    state: "{{ 'mounted' if common_harden_tmp_remount else 'present' }}"
  become: true
  when: common_harden_tmp

- name: Ensure /var/tmp is bound to /tmp
  ansible.posix.mount:
    path: /var/tmp
    src: /tmp
    fstype: none
    opts: "bind"
    state: "{{ 'mounted' if common_harden_tmp_remount else 'present' }}"
  become: true
  when: common_harden_tmp

- name: Find world-writable directories without the sticky bit
  ansible.builtin.shell:
    cmd: "find / -xdev -type d -perm -0002 ! -perm -1000 -print 2>/dev/null || true"
  register: common_world_writable_dirs
  changed_when: false
  check_mode: false
  become: true

- name: Set sticky bit on world-writable directories
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "a+t"
  loop: "{{ common_world_writable_dirs.stdout_lines }}"
  loop_control:
    label: "{{ item }}"
  become: true
  when: common_world_writable_dirs.stdout_lines | length > 0

- name: Restrict permissions on sensitive files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: root
    group: "{{ item.group | default('root') }}"
  loop:
    - path: /etc/shadow
      mode: "0640"
      group: shadow
    - path: /etc/gshadow
      mode: "0640"
      group: shadow
    - path: /etc/passwd
      mode: "0644"
    - path: /etc/group
      mode: "0644"
    - path: /etc/crontab
      mode: "0600"
    - path: /etc/ssh/sshd_config
      mode: "0600"
  loop_control:
    label: "{{ item.path }}"
  become: true
