---
# Filesystem hardening tasks

- name: Harden /tmp mount with noexec,nosuid,nodev
  ansible.posix.mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: "defaults,noexec,nosuid,nodev,size=2G"
    state: mounted
  become: true
  when: common_harden_tmp

- name: Ensure /var/tmp is bound to /tmp
  ansible.posix.mount:
    path: /var/tmp
    src: /tmp
    fstype: none
    opts: "bind"
    state: mounted
  become: true
  when: common_harden_tmp

- name: Set sticky bit on world-writable directories
  ansible.builtin.shell:
    cmd: |
      find / -xdev -type d \( -perm -0002 -a ! -perm -1000 \) -exec chmod a+t {} \; 2>/dev/null || true
  changed_when: false
  become: true

- name: Restrict permissions on sensitive files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: root
    group: "{{ item.group | default('root') }}"
  loop:
    - path: /etc/shadow
      mode: "0640"
      group: shadow
    - path: /etc/gshadow
      mode: "0640"
      group: shadow
    - path: /etc/passwd
      mode: "0644"
    - path: /etc/group
      mode: "0644"
    - path: /etc/crontab
      mode: "0600"
    - path: /etc/ssh/sshd_config
      mode: "0600"
  loop_control:
    label: "{{ item.path }}"
  become: true
  failed_when: false
