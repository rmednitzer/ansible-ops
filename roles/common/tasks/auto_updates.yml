---
# Automatic security updates via unattended-upgrades

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name:
      - unattended-upgrades
      - apt-listchanges
    state: present
  become: true
  when: common_auto_updates_enabled

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  become: true
  when: common_auto_updates_enabled

- name: Enable automatic updates periodic
  ansible.builtin.template:
    src: 20auto-upgrades.j2
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
  become: true
  when: common_auto_updates_enabled

- name: Disable unattended-upgrades when not wanted
  ansible.builtin.apt:
    name: unattended-upgrades
    state: absent
  become: true
  when: not common_auto_updates_enabled
