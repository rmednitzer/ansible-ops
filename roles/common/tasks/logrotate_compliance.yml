---
# Log retention configuration (see docs/compliance-controls.yml)
# CTL-002 — immutable evidence store with retention controls
# CTL-003 — logging legality, minimisation, and forensic correlation
# GDPR Art 5(1)(e) — storage limitation
# GDPR Art 5(2) — accountability (retain audit evidence)
# NIS2 Art 21.2(a) — information system security policies
#
# NOTE: /var/log/syslog and /var/log/auth.log are already managed by the
# distro-shipped /etc/logrotate.d/rsyslog. Adding a second logrotate stanza
# for the same path makes logrotate abort with "duplicate log entry" and
# stops ALL rotation on the host. We therefore replace the rsyslog logrotate
# file in place rather than adding overlapping compliance-* drop-ins.

- name: Apply compliance retention to rsyslog-managed logs
  ansible.builtin.template:
    src: rsyslog-logrotate.j2
    dest: /etc/logrotate.d/rsyslog
    owner: root
    group: root
    mode: "0644"
    backup: true
  become: true

- name: Deploy compliance-aligned logrotate for sudo logs
  ansible.builtin.copy:
    dest: /etc/logrotate.d/compliance-sudo
    content: |
      # Ansible managed — compliance log retention
      # Legal basis: NIS2 Art 21.2(i), GDPR Art 5(2)
      # Retention tier: security_audit ({{ common_log_retention.security_audit }} days)
      # /var/log/sudo.log is created by the users role (sudoers logfile=) and
      # is NOT covered by any distro logrotate config, so a dedicated stanza
      # here does not duplicate an existing entry.
      /var/log/sudo.log {
          rotate {{ (common_log_retention.security_audit | int / 7) | round(0, 'ceil') | int }}
          weekly
          compress
          delaycompress
          missingok
          notifempty
          create 0640 root adm
      }
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Remove superseded duplicate compliance logrotate drop-ins
  ansible.builtin.file:
    path: "/etc/logrotate.d/{{ item }}"
    state: absent
  loop:
    - compliance-auth
    - compliance-syslog
  become: true
