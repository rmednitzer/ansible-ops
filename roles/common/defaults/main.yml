---
# Common role defaults
#
# Compliance references:
#   - NIS2 Art 21.2(a) — policies on risk analysis and information system security
#   - NIS2 Art 21.2(e) — network and information systems security
#   - GDPR Art 32 — security of processing (appropriate technical measures)
#   - GDPR Art 25 — data protection by design and by default
#   - GDPR Art 5(1)(c) — data minimisation (IPv6 privacy extensions)
#   - CRA Annex I Part I — secure-by-default, minimal attack surface
#   - ISO 27001:2022 A.8.9 — configuration management
#   - CTL-0003 — logging legality, minimisation, and forensic correlation
#   - POL-04 — data classification and handling policy

# Timezone (UTC for consistent log correlation per CTL-0003)
common_timezone: "UTC"

# Locale
common_locale: "en_US.UTF-8"
common_language: "en_US.UTF-8"

# Base packages to install
common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - software-properties-common
  - vim
  - htop
  - tmux
  - git
  - wget
  - unzip
  - jq
  - net-tools
  - dnsutils
  - mtr-tiny
  - rsync
  - tree
  - ncdu
  - iotop
  - sysstat
  - logrotate

# Packages to remove (bloat / unnecessary)
common_packages_remove: []

# Automatic security updates via unattended-upgrades
# NIS2 Art 21.2(e) — vulnerability handling without delay
# CRA Annex I Part I — no known exploitable vulnerabilities
common_auto_updates_enabled: true
common_auto_updates_mail: ""
common_auto_updates_reboot: false
common_auto_updates_reboot_time: "02:00"

# Sysctl tuning
# NIS2 Art 21.2(e) — network security
# CRA Annex I Part I — protection of attack surface
# GDPR Art 5(1)(c) — data minimisation (IPv6 privacy)
common_sysctl_settings:
  # Network performance
  net.core.rmem_max: 16777216
  net.core.wmem_max: 16777216
  net.ipv4.tcp_rmem: "4096 87380 16777216"
  net.ipv4.tcp_wmem: "4096 65536 16777216"
  net.core.netdev_max_backlog: 5000
  # Network security hardening
  net.ipv4.conf.all.rp_filter: 1
  net.ipv4.conf.default.rp_filter: 1
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.default.accept_redirects: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv4.conf.all.accept_source_route: 0
  net.ipv4.conf.default.accept_source_route: 0
  net.ipv4.icmp_echo_ignore_broadcasts: 1
  net.ipv4.icmp_ignore_bogus_error_responses: 1
  net.ipv4.conf.all.log_martians: 1
  net.ipv4.conf.default.log_martians: 1
  net.ipv4.tcp_syncookies: 1
  # IPv6 hardening
  net.ipv6.conf.all.accept_redirects: 0
  net.ipv6.conf.default.accept_redirects: 0
  net.ipv6.conf.all.accept_source_route: 0
  net.ipv6.conf.default.accept_source_route: 0
  net.ipv6.conf.all.accept_ra: 0
  net.ipv6.conf.default.accept_ra: 0
  # IPv6 privacy extensions — GDPR Art 5(1)(c) data minimisation
  net.ipv6.conf.all.use_tempaddr: 2
  net.ipv6.conf.default.use_tempaddr: 2
  # VM tuning
  vm.swappiness: 10
  vm.dirty_ratio: 15
  vm.dirty_background_ratio: 5
  # File handles
  fs.file-max: 2097152
  # Protect hardlinks/symlinks
  fs.protected_hardlinks: 1
  fs.protected_symlinks: 1

# Systemd journal max size
# CTL-0003 — retention per log category
common_journal_max_size: "500M"
common_journal_max_retention: "6month"

# MOTD banner
common_motd_enabled: true

# Kernel module blacklist (disable unnecessary/risky modules)
# CRA Annex I Part I — minimal attack surface
common_kernel_modules_blacklist:
  - cramfs
  - freevxfs
  - hfs
  - hfsplus
  - jffs2
  - udf
  - usb-storage
  - dccp
  - sctp
  - rds
  - tipc

# Filesystem hardening - mount options for /tmp
common_harden_tmp: true

# Disable core dumps
# POL-04 — Restricted data must not leak via core dumps
common_disable_core_dumps: true

# Services to disable (common bloat on Ubuntu)
common_services_disable:
  - apport
  - whoopsie

# Log retention categories (see docs/compliance-controls.yml)
# CTL-0002 — immutable evidence store with retention controls
# CTL-0003 — logging legality, minimisation, and forensic correlation
common_log_retention:
  # Governance logs (board minutes, policy approvals, access reviews): 10 years
  governance: "3650"
  # Incident logs: 5 years
  incidents: "1825"
  # CI/build evidence: 3 years
  ci: "1095"
  # DR test evidence: 5 years
  dr_tests: "1825"
  # Security audit logs (auditd, auth): 1 year minimum
  security_audit: "365"
  # Operational logs (syslog, journal): 90 days
  operational: "90"
