---
# Auditd role defaults

# Buffer and backlog settings
auditd_buffer_size: 8192
auditd_backlog_limit: 8192

# Log settings
auditd_max_log_file: 50
auditd_max_log_file_action: rotate
auditd_num_logs: 10
auditd_log_format: ENRICHED

# Failure mode: 0=silent, 1=printk, 2=panic
auditd_failure_mode: 1

# Space left action
auditd_space_left: 75
auditd_space_left_action: SYSLOG
auditd_admin_space_left: 50
auditd_admin_space_left_action: SUSPEND
auditd_disk_full_action: SUSPEND
auditd_disk_error_action: SUSPEND

# Enable CIS Benchmark-aligned audit rules
auditd_cis_rules: true

# Additional custom audit rules (raw auditctl format)
auditd_custom_rules: []
