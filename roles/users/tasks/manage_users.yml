---
# User account management tasks

- name: Create managed user accounts
  ansible.builtin.user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default([]) | join(',') }}"
    append: true
    shell: "{{ item.shell | default('/bin/bash') }}"
    state: "{{ item.state | default('present') }}"
    create_home: true
  loop: "{{ users_managed }}"
  loop_control:
    label: "{{ item.name }}"
  become: true
  when: users_managed | length > 0

- name: Set up SSH authorized keys for managed users
  ansible.posix.authorized_key:
    user: "{{ item.0.name }}"
    key: "{{ item.1 }}"
    state: present
    exclusive: false
  loop: "{{ users_managed | subelements('ssh_keys', skip_missing=true) }}"
  loop_control:
    label: "{{ item.0.name }}"
  become: true
  when: users_managed | length > 0

- name: Set correct permissions on user home directories
  ansible.builtin.file:
    path: "/home/{{ item.name }}"
    mode: "0750"
    owner: "{{ item.name }}"
  loop: "{{ users_managed }}"
  loop_control:
    label: "{{ item.name }}"
  become: true
  when:
    - users_managed | length > 0
    - item.state | default('present') == 'present'
