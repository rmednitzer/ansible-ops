---
# Password policy configuration
# NIS2 Art 21.2(i) — access control
# GDPR Art 32 — security of processing
# POL-03 — access control policy

- name: Install libpam-pwquality
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  become: true

- name: Configure password aging in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^{{ item.key }}"
    line: "{{ item.key }}\t{{ item.value }}"
  loop:
    - key: PASS_MAX_DAYS
      value: "{{ users_password_max_days }}"
    - key: PASS_MIN_DAYS
      value: "{{ users_password_min_days }}"
    - key: PASS_WARN_AGE
      value: "{{ users_password_warn_days }}"
    - key: UMASK
      value: "{{ users_umask }}"
    - key: ENCRYPT_METHOD
      value: "{{ users_password_encrypt_method }}"
    - key: LOGIN_RETRIES
      value: "3"
    - key: LOGIN_TIMEOUT
      value: "{{ users_login_timeout }}"
    - key: LOG_OK_LOGINS
      value: "yes"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  become: true

- name: Configure password quality requirements
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Configure PAM password history
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: "^password.*pam_unix.so"
    line: "password\t[success=1 default=ignore]\tpam_unix.so obscure use_authtok try_first_pass yescrypt remember={{ users_password_remember }}"
  become: true

- name: Configure PAM faillock for account lockout
  ansible.builtin.copy:
    dest: /etc/security/faillock.conf
    content: |
      # Ansible managed — account lockout policy
      # NIS2 Art 21.2(i) — access control
      # Lock account after 5 failed attempts for 15 minutes
      deny = 5
      fail_interval = 900
      unlock_time = 900
      audit
      even_deny_root
      root_unlock_time = 60
    owner: root
    group: root
    mode: "0644"
  become: true
