---
# Password policy configuration
# NIS2 Art 21.2(i) — access control
# GDPR Art 32 — security of processing
# POL-001 — access control policy

- name: Install libpam-pwquality
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  become: true

- name: Configure password aging in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^{{ item.key }}"
    line: "{{ item.key }}\t{{ item.value }}"
  loop:
    - key: PASS_MAX_DAYS
      value: "{{ users_password_max_days }}"
    - key: PASS_MIN_DAYS
      value: "{{ users_password_min_days }}"
    - key: PASS_WARN_AGE
      value: "{{ users_password_warn_days }}"
    - key: UMASK
      value: "{{ users_umask }}"
    - key: ENCRYPT_METHOD
      value: "{{ users_password_encrypt_method }}"
    - key: LOGIN_RETRIES
      value: "3"
    - key: LOGIN_TIMEOUT
      value: "{{ users_login_timeout }}"
    - key: LOG_OK_LOGINS
      value: "yes"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  become: true

- name: Configure password quality requirements
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"
  become: true

# Add password-history enforcement by adding remember= to the existing
# pam_unix entry rather than rewriting the whole line with a fragile
# regexp (which would drop hashing/option arguments and fight
# pam-auth-update).
- name: Enforce PAM password history (remember)
  community.general.pamd:
    name: common-password
    type: password
    control: "[success=1 default=ignore]"
    module_path: pam_unix.so
    module_arguments: "remember={{ users_password_remember }}"
    state: args_present
  become: true

- name: Configure PAM faillock thresholds
  ansible.builtin.template:
    src: faillock.conf.j2
    dest: /etc/security/faillock.conf
    owner: root
    group: root
    mode: "0644"
  become: true
  when: users_faillock_enabled

# faillock.conf is inert unless pam_faillock is in the PAM stack. Wire it in
# (preauth + authfail + authsucc in common-auth, account in common-account)
# so the lockout policy is actually enforced (POL-001, NIS2 Art 21.2(i)).
- name: Add pam_faillock preauth to common-auth
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_unix.so
    new_type: auth
    new_control: required
    new_module_path: pam_faillock.so
    module_arguments: preauth
    state: before
  become: true
  when: users_faillock_enabled

- name: Add pam_faillock authfail to common-auth
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[success=1 default=ignore]"
    module_path: pam_unix.so
    new_type: auth
    new_control: "[default=die]"
    new_module_path: pam_faillock.so
    module_arguments: authfail
    state: after
  become: true
  when: users_faillock_enabled

- name: Add pam_faillock authsucc to common-auth
  community.general.pamd:
    name: common-auth
    type: auth
    control: "[default=die]"
    module_path: pam_faillock.so
    new_type: auth
    new_control: sufficient
    new_module_path: pam_faillock.so
    module_arguments: authsucc
    state: after
  become: true
  when: users_faillock_enabled

- name: Add pam_faillock account check to common-account
  community.general.pamd:
    name: common-account
    type: account
    control: "[success=1 new_authtok_reqd=done default=ignore]"
    module_path: pam_unix.so
    new_type: account
    new_control: required
    new_module_path: pam_faillock.so
    state: before
  become: true
  when: users_faillock_enabled
