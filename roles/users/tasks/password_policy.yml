---
# Password policy configuration

- name: Install libpam-pwquality
  ansible.builtin.apt:
    name: libpam-pwquality
    state: present
  become: true

- name: Configure password aging in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "^{{ item.key }}"
    line: "{{ item.key }}\t{{ item.value }}"
  loop:
    - key: PASS_MAX_DAYS
      value: "{{ users_password_max_days }}"
    - key: PASS_MIN_DAYS
      value: "{{ users_password_min_days }}"
    - key: PASS_WARN_AGE
      value: "{{ users_password_warn_days }}"
    - key: UMASK
      value: "{{ users_umask }}"
  loop_control:
    label: "{{ item.key }}={{ item.value }}"
  become: true

- name: Configure password quality requirements
  ansible.builtin.template:
    src: pwquality.conf.j2
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Configure PAM password history
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-password
    regexp: "^password.*pam_unix.so"
    line: "password\t[success=1 default=ignore]\tpam_unix.so obscure use_authtok try_first_pass yescrypt remember={{ users_password_remember }}"
  become: true
