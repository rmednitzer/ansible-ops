---
# Account hardening tasks

- name: Set default umask in /etc/profile
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: "^umask"
    line: "umask {{ users_umask }}"
  become: true

- name: Set default umask in /etc/bash.bashrc
  ansible.builtin.lineinfile:
    path: /etc/bash.bashrc
    regexp: "^umask"
    line: "umask {{ users_umask }}"
  become: true

- name: Set login timeout in /etc/profile
  ansible.builtin.lineinfile:
    path: /etc/profile
    regexp: "^TMOUT="
    line: "TMOUT={{ users_login_timeout }}"
  become: true

- name: Lock root account
  ansible.builtin.user:
    name: root
    password_lock: true
  become: true
  when: users_lock_root

- name: Disable unnecessary system accounts
  ansible.builtin.user:
    name: "{{ item }}"
    shell: /usr/sbin/nologin
  loop:
    - daemon
    - bin
    - sys
    - sync
    - games
    - man
    - lp
    - mail
    - news
    - uucp
    - proxy
    - www-data
    - backup
    - list
    - irc
    - gnats
    - nobody
  become: true
  when: users_disable_system_accounts
  failed_when: false
