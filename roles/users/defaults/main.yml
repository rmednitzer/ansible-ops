---
# Users role defaults
#
# Compliance references:
#   - NIS2 Art 21.2(i) — HR security, access control, asset management
#   - NIS2 Art 21.2(j) — multi-factor authentication
#   - GDPR Art 32 — security of processing
#   - GDPR Art 25 — data protection by design and by default
#   - POL-03 — access control policy (least privilege, default deny)
#   - CTL-0001 — federated IAM with MFA and auditable authorization
#   - ISO 27001:2022 A.5.15 — access control
#   - ISO 27001:2022 A.8.2 — privileged access rights
#   - ISO 27001:2022 A.8.5 — secure authentication

# Deploy users from this list
# Each item: name, groups, shell, ssh_keys, state
users_managed: []
#  - name: deploy
#    groups:
#      - sudo
#    shell: /bin/bash
#    ssh_keys:
#      - "ssh-ed25519 AAAA... deploy@example.com"
#    state: present

# Sudo configuration
users_sudo_group: "sudo"
users_sudo_passwordless: false
users_sudo_require_tty: true

# Password policy (PAM / login.defs)
# GDPR Art 32 — appropriate technical measures
# NIS2 Art 21.2(i) — access control
users_password_max_days: 90
users_password_min_days: 7
users_password_warn_days: 14
users_password_min_length: 14
users_password_remember: 12
users_password_min_class: 4

# Encryption method for stored passwords
# POL-06 — cryptography policy: no MD5, no SHA-1
users_password_encrypt_method: "YESCRYPT"

# Login restrictions
users_login_timeout: 60
users_umask: "027"

# Disable unused system accounts
users_disable_system_accounts: true

# Lock root account (disable direct root login)
# POL-03 — least privilege: JIT access via sudo
users_lock_root: true
